name: RPSC Math Bot Daily Runner

on:
  schedule:
    # 💡 IST के हिसाब से रात 1:00, 3:00, सुबह 5:00 और 7:00 बजे चलेगा
    - cron: '30 19,21,23,1 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lohit-deva
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Master AI Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python master_telegram_bot.py

      - name: Save Changes to GitHub
        run: |
          git config --global user.name "MasterBot"
          git config --global user.email "bot@rpsc.com"
          git add .
          git commit -m "✅ Auto-moved posted question to Done folder" || echo "No changes to commit"
          git push
