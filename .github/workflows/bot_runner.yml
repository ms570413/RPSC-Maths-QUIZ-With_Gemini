name: RPSC Math Bot Daily Runner

on:
  schedule:
    # 💡 IST के हिसाब से दोपहर 2:00 बजे और रात 2:00 बजे चलेगा (12 घंटे का गैप)
    - cron: '30 8,20 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lohit-deva
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Master AI Bot
        env:
          # 💡 Sari 10 Gemini keys
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GEMINI_API_KEY_9: ${{ secrets.GEMINI_API_KEY_9 }}
          GEMINI_API_KEY_10: ${{ secrets.GEMINI_API_KEY_10 }}
          # 💡 Discord Keys Naya Setup
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python master_discord_bot.py

      - name: Save Changes to GitHub
        run: |
          git config --global user.name "MasterBot"
          git config --global user.email "bot@rpsc.com"
          git add .
          git commit -m "✅ Auto-moved 25 questions to Done folder (Discord)" || echo "No changes to commit"
          
          # 💡 Push karne se pehle remote changes ko Pull (Rebase) karega
          git pull --rebase origin main
          
          git push
