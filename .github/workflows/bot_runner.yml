name: RPSC Math Bot Daily Runner

on:
  schedule:
    # 💡 IST के हिसाब से रात 12:00, 2:00, 4:00, सुबह 6:00 और 8:00 बजे (2-2 घंटे का गैप)
    - cron: '30 18,20,22,0,2 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lohit-deva
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Master AI Bot
        env:
          # 💡 Yahan sari 7 keys connect kar di hain
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python master_telegram_bot.py

      - name: Save Changes to GitHub
        run: |
          git config --global user.name "MasterBot"
          git config --global user.email "bot@rpsc.com"
          git add .
          git commit -m "✅ Auto-moved posted question to Done folder" || echo "No changes to commit"
          git push
